apiVersion: apps/v1
kind: Deployment
metadata:
  name: asterisk
  namespace: asterisk
  labels:
    app: asterisk
spec:
  replicas: 1
  selector:
    matchLabels:
      app: asterisk
  template:
    metadata:
      labels:
        app: asterisk
    spec:
      containers:
        - name: bot
          image: ghcr.io/xenbyte/asterisk:latest
          imagePullPolicy: Always
          env:
            - name: TELEGRAM_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: asterisk-secret
                  key: telegram-bot-token
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: asterisk-secret
                  key: anthropic-api-key
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: asterisk-secret
                  key: database-url
            - name: ADMIN_TELEGRAM_ID
              valueFrom:
                secretKeyRef:
                  name: asterisk-secret
                  key: admin-telegram-id
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "500m"
